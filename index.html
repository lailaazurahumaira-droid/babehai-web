<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>babeh.ai v50.1 - New Free Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { background-color: #010204; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .sidebar-bg { background: #0b0e14; border-right: 1px solid #1f2937; }
        @media (max-width: 1024px) { .sidebar-bg { border-right: none; border-bottom: 1px solid #1f2937; } }
        .accent-emerald { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .input-pro { background: #010409; border: 1px solid #30363d; border-radius: 12px; color: #f0f6fc; font-size: 13px; width: 100%; transition: all 0.2s; outline: none; }
        .input-pro:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
        .loader { border: 3px solid rgba(255,255,255,0.05); border-left-color: #10b981; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [mode, setMode] = useState('foto'); 
            const [isGenerating, setIsGenerating] = useState(false);
            const [result, setResult] = useState(null);
            const [logs, setLogs] = useState(['Mesin Publik Baru Siap. Siap digunakan...']);
            
            const [imgFace, setImgFace] = useState(null);
            const [imgProduct, setImgProduct] = useState(null);
            const [poseText, setPoseText] = useState('');
            const [fabInput, setFabInput] = useState('');

            const jalankanEksekusi = async () => {
                // Syarat upload wajah & produk kita nonaktifkan dulu di versi ini biar Bos cepet ngetes
                
                setIsGenerating(true);
                setResult(null);
                addLog('Inisiasi Render (Jalur Rakyat)...');
                
                try {
                    if (mode === 'foto') {
                        addLog('Menerjemahkan Prompt (Naskah & Pose)...');
                        await new Promise(r => setTimeout(r, 1000));
                        
                        // Prompt wajib pakai bahasa Inggris biar AI nya nggak bingung
                        const userPrompt = fabInput || "A realistic streetwear hoodie product shot";
                        const userPose = poseText || "standing cool";
                        const fullPrompt = `${userPrompt}, ${userPose}, photorealistic, detailed, urban style, 4k`;
                        
                        addLog('Merender Visual (Harap Tunggu)...');
                        await new Promise(r => setTimeout(r, 2000));

                        // --- GANTI MESIN KE OPENAI GRATIS (DALLE-2) ---
                        const encodedPrompt = encodeURIComponent(fullPrompt);
                        const finalUrl = `https://openai-api.pollinations.ai/generate/${encodedPrompt}?nologo=true&width=1080&height=1920`;
                        
                        setResult(finalUrl);
                        addLog(`✅ SUKSES: Gambar Asli Berhasil Dibuat!`);
                        
                    } else {
                        // Mode Video (Dummy)
                        addLog('Menyiapkan Video Simulasi...');
                        await new Promise(r => setTimeout(r, 2000));
                        setResult('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4');
                        addLog(`✅ SUKSES: Video Simulasi Selesai.`);
                    }
                } catch (err) {
                    addLog(`❌ ERROR: Gagal terhubung ke AI Publik.`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 4));

            return (
                <div className="flex flex-col lg:flex-row min-h-screen relative">
                    
                    {/* WIDGET SALDO UNLIMITED */}
                    <div className="fixed top-4 right-4 lg:top-8 lg:right-10 z-50 bg-gray-900/90 backdrop-blur-md border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-3 shadow-2xl shadow-blue-500/10 fade-in">
                        <span className="text-blue-500 text-xl">⚡</span>
                        <div className="flex flex-col">
                            <span className="text-[8px] text-gray-500 font-black uppercase tracking-widest leading-none">STATUS SERVER</span>
                            <span className="text-sm text-white font-black leading-none mt-1">OPENAI FREE</span>
                        </div>
                    </div>

                    <aside className="sidebar-bg w-full lg:w-80 flex-none flex flex-col p-6 space-y-8 z-40 border-b lg:border-b-0 border-gray-800 pt-20 lg:pt-6">
                        <div className="text-center lg:text-left">
                            <h1 className="text-3xl font-black text-white italic tracking-tighter">babeh<span className="text-emerald-500">.ai</span></h1>
                            <p className="text-[10px] text-blue-400 font-bold uppercase mt-1 tracking-widest leading-none">New Free Engine Edition</p>
                        </div>
                        
                        <nav className="flex flex-row lg:flex-col gap-2 overflow-x-auto no-scrollbar pb-2">
                            {[ { id: 'foto', label: '📸 Lab Pembuatan Gambar' }, { id: 'ugc', label: '🎥 Arsitek Video Viral' } ].map(m => (
                                <button key={m.id} onClick={() => {setMode(m.id); setResult(null);}}
                                    className={`flex-none lg:flex p-5 rounded-2xl text-left border transition-all font-bold text-sm ${mode === m.id ? 'bg-emerald-500/10 border-emerald-500/50 text-white shadow-xl shadow-emerald-950/20' : 'border-transparent text-gray-500 hover:bg-gray-800/40'}`}>
                                    {m.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="mt-auto p-4 bg-gray-900 border border-gray-800 rounded-2xl text-center space-y-2">
                            <span className="text-[10px] font-black text-blue-500 uppercase leading-none">JALUR AKSES</span>
                            <div className="w-full input-pro p-3 text-center text-xs text-gray-500 font-mono">OPENAI_JALUR_RAKYAT_AKTIF</div>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 lg:p-10 space-y-10 bg-[#010204]/40 overflow-y-auto pt-16 lg:pt-10">
                        <div className="flex justify-between items-end border-b border-gray-800 pb-6 pt-12 lg:pt-0">
                            <h2 className="text-2xl font-black text-white italic uppercase tracking-tight leading-none">Setup {mode === 'foto' ? 'Buat Gambar' : 'Video Viral'}</h2>
                            <span className="bg-blue-500/10 text-blue-500 text-[9px] px-3 py-1.5 rounded-lg border border-blue-500/30 font-black uppercase hidden sm:block">Unlimited & Free Mode</span>
                        </div>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-12 fade-in" key={mode}>
                            <div className="space-y-8">
                                <h3 className="text-xs font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">1. Visual & Pose</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <UploadSlot title="Wajah Talent (Simulasi)" img={imgFace} setImg={setImgFace} wajib={false} />
                                    <UploadSlot title="Produk (Simulasi)" img={imgProduct} setImg={setImgProduct} wajib={false} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-emerald-500 uppercase tracking-widest ml-1 leading-none">Deskripsi Pose (Wajib Inggris)</label>
                                    <textarea value={poseText} onChange={(e)=>setPoseText(e.target.value)} className="w-full input-pro p-4 h-20" placeholder="Contoh: standing cool holding product..."></textarea>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <h3 className="text-xs font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">2. Naskah & Opsi</h3>
                                <div className="p-5 bg-gray-900/40 border border-gray-800 rounded-3xl space-y-4 shadow-inner">
                                    <label className="text-[10px] font-black text-gray-500 uppercase leading-none block mb-3">Prompt Pakaian & Latar (Wajib Inggris)</label>
                                    <textarea value={fabInput} onChange={(e)=>setFabInput(e.target.value)} className="w-full input-pro p-4 h-24" placeholder="Contoh: wearing detailed streetwear hoodie, black color, in urban city outdoor..."></textarea>
                                </div>
                                <div className="grid grid-cols-2 gap-4 text-left">
                                    <Select label="Gaya Visual" opsi={['Katalog Bersih Studio', 'High-Fashion Vogue']} />
                                    <Select label="Pencahayaan" opsi={['Studio Softbox', 'Matahari Sore']} />
                                </div>
                            </div>
                        </div>

                        <div className="pt-8 relative">
                            <button onClick={jalankanEksekusi} disabled={isGenerating} 
                                className="relative w-full accent-emerald text-white font-black text-xl py-7 rounded-3xl active:scale-95 transition-all shadow-2xl shadow-emerald-500/20 uppercase tracking-widest flex items-center justify-center overflow-hidden">
                                {isGenerating ? (
                                    <div className="flex items-center gap-3"><div className="loader inline-block"></div> MEMPROSES GRATIS...</div>
                                ) : (
                                    '🚀 MULAI GENERATE'
                                )}
                            </button>
                            
                            <div className="mt-4 bg-black border border-gray-800 rounded-xl p-4 font-mono text-[10px] text-emerald-500 h-16 flex flex-col justify-center overflow-hidden shadow-inner overflow-y-auto no-scrollbar">
                                {logs.map((l, i) => <div key={i} className={i === 0 ? 'text-white font-bold' : 'opacity-30'}>[SYS]: {l}</div>)}
                            </div>
                        </div>
                    </main>

                    <section className="w-full lg:w-[450px] sidebar-bg p-6 flex flex-col items-center justify-center border-l border-gray-800">
                        <div className="relative w-full aspect-[9/16] max-w-[300px] rounded-[3.5rem] border-[12px] border-gray-800 bg-black shadow-2xl overflow-hidden group">
                            {!result && !isGenerating && <div className="absolute inset-0 flex items-center justify-center text-7xl opacity-5">🧬</div>}
                            {isGenerating && (
                                <div className="absolute inset-0 bg-black/95 z-30 flex flex-col items-center justify-center p-6 text-center">
                                    <div className="loader w-14 h-14 border-4 border-t-emerald-500 mb-6 shadow-glow"></div>
                                    <p className="text-emerald-500 text-[10px] font-black animate-pulse tracking-widest uppercase text-center">Server Processing...</p>
                                </div>
                            )}
                            {result && (
                                <div className="w-full h-full relative fade-in">
                                    {mode === 'foto' ? <img src={result} className="w-full h-full object-cover opacity-90" /> : <video src={result} autoPlay loop muted className="w-full h-full object-cover opacity-90" />}
                                1</div>
                            )}
                        </div>
                    </section>
                </div>
            );
        }

        function UploadSlot({ title, img, setImg, wajib }) {
            return (
                <div className="space-y-1 text-left">
                    <label className="text-[10px] font-black text-gray-500 uppercase tracking-tighter leading-none">{title} {wajib && '*'}</label>
                    <div className={`relative w-full h-28 rounded-2xl border-2 transition-all overflow-hidden ${img ? 'border-emerald-500 bg-black' : 'border-dashed border-gray-800 bg-gray-900/20 hover:border-emerald-500/50'}`}>
                        {img ? (
                            <div className="relative w-full h-full group">
                                <img src={img} className="w-full h-full object-cover" />
                                <button onClick={()=>setImg(null)} className="absolute inset-0 bg-black/60 text-red-500 text-xs font-black uppercase flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">Hapus</button>
                            </div>
                        ) : (
                            <label className="w-full h-full flex flex-col items-center justify-center cursor-pointer opacity-20 hover:opacity-100 transition-all">
                                <span className="text-xl">+</span>
                                <input type="file" className="hidden" onChange={(e)=>{const r=new FileReader(); r.onload=(ev)=>setImg(ev.target.result); r.readAsDataURL(e.target.files[0]);}} />
                            </label>
                        )}
                    </div>
                </div>
            );
        }

        function Select({ label, opsi }) {
            return (
                <div className="space-y-1.5 text-left">
                    <label className="text-[10px] font-black text-gray-500 uppercase tracking-tighter ml-1 leading-none">{label}</label>
                    <select className="input-pro p-4 font-bold appearance-none cursor-pointer">
                        {opsi.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

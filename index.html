<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>babeh.ai v49.0 - Real Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { background-color: #010204; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .sidebar-bg { background: #0b0e14; border-right: 1px solid #1f2937; }
        @media (max-width: 1024px) { .sidebar-bg { border-right: none; border-bottom: 1px solid #1f2937; } }
        .accent-emerald { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .input-pro { background: #010409; border: 1px solid #30363d; border-radius: 12px; color: #f0f6fc; font-size: 13px; width: 100%; transition: all 0.2s; outline: none; }
        .input-pro:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
        .loader { border: 3px solid rgba(255,255,255,0.05); border-left-color: #10b981; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [mode, setMode] = useState('ugc'); 
            const [isGenerating, setIsGenerating] = useState(false);
            const [result, setResult] = useState(null);
            const [logs, setLogs] = useState(['Menunggu API Key Fal.ai...']);
            
            const [falKey, setFalKey] = useState(() => localStorage.getItem('babeh_fal_api_key') || '');
            const [saldoAsli, setSaldoAsli] = useState('Kunci Kosong');

            useEffect(() => {
                const cekSaldo = async () => {
                    if (!falKey) return setSaldoAsli('Kunci Kosong');
                    setSaldoAsli('Memeriksa...');
                    try {
                        const res = await fetch('/api/balance', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ falKey: falKey })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            const nominal = data.credits?.balance || data.balance || 0;
                            setSaldoAsli(`$${Number(nominal).toFixed(2)} USD`);
                        } else { setSaldoAsli('$0.00 (Habis)'); }
                    } catch (err) { setSaldoAsli('Error Cek'); }
                };
                const timer = setTimeout(() => cekSaldo(), 1000);
                return () => clearTimeout(timer);
            }, [falKey]);

            const handleKeyChange = (e) => {
                const newKey = e.target.value.trim();
                setFalKey(newKey);
                localStorage.setItem('babeh_fal_api_key', newKey);
            };

            const [imgFace, setImgFace] = useState(null);
            const [imgProduct, setImgProduct] = useState(null);
            const [poseText, setPoseText] = useState('');
            const [fabInput, setFabInput] = useState('');

            const jalankanEksekusi = async () => {
                if (!falKey) return alert('Masukkan API Key dulu Bos!');
                if (!imgFace || !imgProduct) return alert('Wajah & Produk Wajib Diunggah!');
                
                setIsGenerating(true);
                setResult(null);
                addLog(`Menghubungi Server Fal.ai...`);

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            falKey: falKey,
                            prompt: `${fabInput}. Pose: ${poseText}. Realistic, 4k.`,
                            imageUrl: "https://raw.githubusercontent.com/CompVis/stable-diffusion/main/assets/stable-samples/img2img/sketch-mountains-input.jpg",
                            mode: mode
                        })
                    });

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Server Fal.ai nolak (Cek Saldo)');

                    let finalUrl = mode === 'foto' ? data.images?.[0]?.url : data.video?.url;
                    setResult(finalUrl);
                    addLog(`✅ SUKSES ASLI: Konten Berhasil Dibuat!`);
                } catch (err) {
                    addLog(`❌ ERROR: ${err.message}`);
                    alert(err.message);
                } finally { setIsGenerating(false); }
            };

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 3));

            return (
                <div className="flex flex-col lg:flex-row min-h-screen relative">
                    <div className="fixed top-4 right-4 z-50 bg-gray-900 border border-emerald-500/30 px-4 py-2 rounded-2xl flex items-center gap-3">
                        <span className="text-emerald-500">💵</span>
                        <div className="flex flex-col">
                            <span className="text-[8px] text-gray-500 uppercase font-black">SALDO ASLI</span>
                            <span className="text-sm text-white font-black">{saldoAsli}</span>
                        </div>
                    </div>

                    <aside className="sidebar-bg w-full lg:w-80 p-6 space-y-8 flex flex-col pt-20 lg:pt-6">
                        <h1 className="text-3xl font-black italic">babeh<span className="text-emerald-500">.ai</span></h1>
                        <nav className="space-y-2">
                            {['ugc', 'foto'].map(m => (
                                <button key={m} onClick={() => {setMode(m); setResult(null);}} className={`w-full p-4 rounded-xl text-left font-bold ${mode === m ? 'bg-emerald-500/10 border-emerald-500 text-white border' : 'text-gray-500'}`}>
                                    {m === 'ugc' ? '🎥 Video Viral' : '📸 Lab Gambar'}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 bg-gray-900 rounded-xl space-y-2 border border-gray-800">
                            <label className="text-[10px] font-black text-emerald-500 uppercase">Input API Key (Fal.ai)</label>
                            <input type="password" value={falKey} onChange={handleKeyChange} placeholder="Paste kuncinya disini" className="input-pro p-3 text-xs" />
                        </div>
                    </aside>

                    <main className="flex-1 p-4 lg:p-10 space-y-10 overflow-y-auto">
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8 pt-12 lg:pt-0">
                            <div className="space-y-6">
                                <h3 className="text-xs font-black text-emerald-500 uppercase">1. Visual Setup</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <UploadSlot title="Wajah" img={imgFace} setImg={setImgFace} />
                                    <UploadSlot title="Produk" img={imgProduct} setImg={setImgProduct} />
                                </div>
                                <textarea value={poseText} onChange={(e)=>setPoseText(e.target.value)} className="w-full input-pro p-4 h-20" placeholder="Deskripsi Pose..."></textarea>
                            </div>
                            <div className="space-y-6">
                                <h3 className="text-xs font-black text-emerald-500 uppercase">2. Content Setup</h3>
                                <textarea value={fabInput} onChange={(e)=>setFabInput(e.target.value)} className="w-full input-pro p-4 h-32" placeholder="Naskah F.A.B / Prompt..."></textarea>
                            </div>
                        </div>
                        <button onClick={jalankanEksekusi} disabled={isGenerating} className="w-full accent-emerald text-white font-black py-6 rounded-3xl text-xl shadow-2xl shadow-emerald-500/20">
                            {isGenerating ? 'MENGHUBUNGI SERVER...' : '🚀 MULAI GENERATE'}
                        </button>
                        <div className="bg-black border border-gray-800 p-4 rounded-xl font-mono text-[10px] text-emerald-500">
                            {logs.map((l, i) => <div key={i} className={i===0 ? 'text-white' : 'opacity-30'}>[SYS]: {l}</div>)}
                        </div>
                    </main>

                    <section className="w-full lg:w-[400px] sidebar-bg p-6 flex flex-col items-center justify-center">
                        <div className="w-full aspect-[9/16] rounded-[3rem] border-[10px] border-gray-800 bg-black overflow-hidden relative">
                            {result ? (
                                mode === 'foto' ? <img src={result} className="w-full h-full object-cover" /> : <video src={result} autoPlay loop muted className="w-full h-full object-cover" />
                            ) : (
                                <div className="absolute inset-0 flex items-center justify-center text-4xl opacity-5">🧬</div>
                            )}
                        </div>
                    </section>
                </div>
            );
        }

        function UploadSlot({ title, img, setImg }) {
            return (
                <div className="space-y-1">
                    <label className="text-[10px] font-black text-gray-500 uppercase">{title}</label>
                    <div className="relative h-28 rounded-xl border-2 border-dashed border-gray-800 bg-gray-900/20 flex items-center justify-center">
                        {img ? <img src={img} className="w-full h-full object-cover rounded-xl" /> : 
                        <label className="cursor-pointer text-xl opacity-20"><input type="file" className="hidden" onChange={(e)=>{const r=new FileReader(); r.onload=(ev)=>setImg(ev.target.result); r.readAsDataURL(e.target.files[0]);}} />+</label>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
